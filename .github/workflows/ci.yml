name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      # 1. Setup Bun runtime and install dependency caching automatically
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 2. Use Bun to install your packages safely using your Bun lockfile
      - run: bun install --frozen-lockfile

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - run: npx nx record -- npx nx format:check --base="remotes/origin/main"

      # Bun automatically intercepts 'npx nx' commands execution for faster speeds
      - run: bunx nx run-many -t lint test build typecheck e2e-ci

      # Nx Cloud recommends fixes for failures to help you get CI green faster.
      - run: npx nx fix-ci
        if: always()